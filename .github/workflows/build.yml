name: UHVA Player — Build

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*.*.*'          # triggers release build: v1.0.0, v1.2.3, etc.
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version — e.g. 1.0.0'
        required: true
        default: '1.0.0'

# Cancel any in-progress run for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ────────────────────────────────────────────────────────────────────────
  # JOB 1 — Debug APK (runs on every push to main/develop)
  # ────────────────────────────────────────────────────────────────────────
  build_debug:
    name: Debug APK
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

      - name: Generate app icons & splash screen
        run: |
          dart run flutter_launcher_icons
          dart run flutter_native_splash:create

      - name: Build debug APK
        run: flutter build apk --debug --split-per-abi

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: debug-apks-${{ github.sha }}
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-debug.apk
            build/app/outputs/flutter-apk/app-x86_64-debug.apk
          retention-days: 14

      - name: Comment APK size on PR
        if: github.event_name == 'pull_request'
        run: |
          SIZE=$(du -sh build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk | cut -f1)
          echo "### Debug APK built ✓" >> $GITHUB_STEP_SUMMARY
          echo "**arm64-v8a size:** $SIZE" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────────────────
  # JOB 2 — Release APK (runs only on version tags: v1.0.0)
  # ────────────────────────────────────────────────────────────────────────
  build_release:
    name: Release APK
    runs-on: ubuntu-latest
    if: (github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$TAG" >> $GITHUB_OUTPUT
          echo "Building release version: $TAG"

      - name: Update pubspec version
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          BUILD_NUMBER=${{ github.run_number }}
          sed -i "s/^version: .*/version: ${VERSION}+${BUILD_NUMBER}/" pubspec.yaml
          echo "pubspec version set to ${VERSION}+${BUILD_NUMBER}"

      # ── Keystore signing setup ──────────────────────────────────────────
      # To enable signed release builds:
      # 1. Generate keystore: keytool -genkey -v -keystore uhva.jks ...
      # 2. Base64 encode it: base64 -i uhva.jks | pbcopy
      # 3. Add GitHub secrets:
      #    KEYSTORE_BASE64, KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD
      - name: Decode keystore (if secret exists)
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/uhva-release.jks
          echo "Keystore decoded"

      - name: Create key.properties (if signing configured)
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=uhva-release.jks
          EOF

      - name: Generate app icons & splash screen
        run: |
          dart run flutter_launcher_icons
          dart run flutter_native_splash:create

      - name: Build release APK (split per ABI)
        run: flutter build apk --release --split-per-abi --obfuscate --split-debug-info=build/debug-info

      - name: Build universal release APK
        run: flutter build apk --release

      - name: Collect APK info
        run: |
          echo "### Release APKs built ✓" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.VERSION }}+${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| APK | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------|" >> $GITHUB_STEP_SUMMARY
          for f in build/app/outputs/flutter-apk/app-*-release.apk; do
            SIZE=$(du -sh "$f" | cut -f1)
            NAME=$(basename "$f")
            echo "| $NAME | $SIZE |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Upload release APKs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uhva-player-${{ steps.version.outputs.VERSION }}
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      # ── Create GitHub Release with APKs attached ────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: "UHVA Player ${{ steps.version.outputs.VERSION }}"
          body: |
            ## UHVA Player ${{ steps.version.outputs.VERSION }}

            ### Downloads
            | File | Architecture | Recommended for |
            |------|-------------|-----------------|
            | `app-arm64-v8a-release.apk` | ARM 64-bit | Most modern phones & Android TV boxes |
            | `app-armeabi-v7a-release.apk` | ARM 32-bit | Older Android devices |
            | `app-x86_64-release.apk` | x86 64-bit | Emulators & some TV sticks |
            | `app-release.apk` | Universal | All devices (larger file) |

            ### Install
            ```bash
            # Phone
            adb install app-arm64-v8a-release.apk

            # Android TV / Fire TV
            adb connect <TV_IP>:5555
            adb install app-arm64-v8a-release.apk
            ```

            **Built by:** Thirdsan Enterprises Ltd, Kampala
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
