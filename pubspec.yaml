name: uhva_player
description: UHVA Player — Professional IPTV Player for Android Phone & Android TV
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Video playback (media_kit — best Android TV support) ─────────────────
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_android_video: ^1.3.2   # Android native libs (HLS + MPEG-TS)

  # ── Networking ────────────────────────────────────────────────────────────
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # ── State management ─────────────────────────────────────────────────────
  provider: ^6.1.2

  # ── Local storage ────────────────────────────────────────────────────────
  shared_preferences: ^2.3.1

  # ── Image caching ────────────────────────────────────────────────────────
  cached_network_image: ^3.3.1

  # ── XML (EPG parsing) ────────────────────────────────────────────────────
  xml: ^6.5.0

  # ── Utils ────────────────────────────────────────────────────────────────
  intl: ^0.19.0
  flutter_spinkit: ^5.2.1
  fluttertoast: ^8.2.8
  package_info_plus: ^8.0.2
  wakelock_plus: ^1.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
